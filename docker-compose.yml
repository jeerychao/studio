
version: '3.8'

services:
  ipam-app:
    build:
      context: . # Use the current directory as the build context
      dockerfile: Dockerfile # Specify the Dockerfile name
    image: ipam-app-local:latest # Name the image that will be built
    container_name: ipam_app_local_prod
    ports:
      # Map host port 3010 to container port 3000
      # Access via http://localhost:3010 on the host machine if WSL port forwarding is set up,
      # or via WSL's IP:3010
      - "3010:3000"
    env_file:
      - ./production.env # Load environment variables from this file for runtime
    restart: unless-stopped
    networks:
      - app_network
    # Temporarily removed specific DB file volume mount to ensure the image's /app/prisma/dev.db is used.
    # The Dockerfile already copies a seeded dev.db into /app/prisma/.
    # If you need data persistence for dev.db across container *removals* (not just stop/start),
    # you can re-add a volume specifically for the database file:
    # volumes:
    #   - ipam_db_data:/app/prisma/dev.db
    # Be mindful that if this named volume 'ipam_db_data' already exists with content,
    # it will take precedence over the image's baked-in DB file.
    # To start fresh with the image's DB, you might need to `docker volume rm ipam_db_data` first.

networks:
  app_network:
    driver: bridge

# Define the volume if you re-enable the 'volumes' section in the service for dev.db persistence
# volumes:
#   ipam_db_data:
