
services:
  ipam-app:
    build:
      context: .
      dockerfile: Dockerfile
      args: # 将ENCRYPTION_KEY作为构建参数传递
        - ENCRYPTION_KEY_ARG=${ENCRYPTION_KEY}
    image: ipam-app-local:latest
    container_name: ipam_app_local_prod
    ports:
      - "8081:3000"
    env_file:
      - ./production.env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:8081}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-${NEXT_PUBLIC_BASE_URL:-http://localhost:8081}}
      - NEXT_PUBLIC_EXTERNAL_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:8081}
      - NEXT_PRIVATE_EXTERNAL_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:8081}
    volumes:
      - ipam_db_data:/app/prisma
      - ipam_logs_data:/app/logs
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "/app/health-check.sh"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app_network:
    driver: bridge

volumes:
  ipam_db_data:
  ipam_logs_data:
