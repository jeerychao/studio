version: '3.8'

services:
  ipam-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ipam-app-local:latest
    container_name: ipam_app_local_prod
    ports:
      - "3010:3000"
    env_file:
      - ./production.env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NEXT_PUBLIC_BASE_URL=http://17.100.100.253:3010
      - NEXTAUTH_URL=http://17.100.100.253:3010
    restart: unless-stopped
    networks:
      - app_network
    volumes:
      - prisma_data:/app/prisma

networks:
  app_network:
    driver: bridge

volumes:
  prisma_data:
    driver: local